version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: casi-postgres
    environment:
      POSTGRES_DB: casi
      POSTGRES_USER: casi_user
      POSTGRES_PASSWORD: casi_pass
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U casi_user -d casi"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer
    container_name: casi-adminer
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  postgres_data: